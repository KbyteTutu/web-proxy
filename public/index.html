<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Web 代理</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        height: 100vh; display: flex; flex-direction: column;
        font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0;
      }
      .toolbar {
        display: flex; gap: .5rem; padding: .75rem 1rem;
        background: #1e293b; border-bottom: 1px solid #334155; flex-shrink: 0;
      }
      input {
        flex: 1; padding: .6rem .8rem; border: 1px solid #334155; border-radius: 8px;
        background: #0f172a; color: #e2e8f0; font-size: .95rem;
      }
      .toolbar button {
        padding: .6rem 1rem; border: 0; border-radius: 8px;
        font-size: .95rem; cursor: pointer; white-space: nowrap;
      }
      .go { background: #3b82f6; color: #fff; }
      .go:hover { background: #2563eb; }
      .logout { background: #475569; color: #e2e8f0; }
      .logout:hover { background: #334155; }
      .landing {
        flex: 1; display: flex; flex-direction: column; align-items: center;
        justify-content: center; gap: 1rem;
      }
      .landing h1 { font-size: 1.4rem; font-weight: 500; }
      .landing p { color: #94a3b8; font-size: .85rem; }
      iframe {
        flex: 1; width: 100%; border: 0; display: none;
      }
      #status { color: #f87171; font-size: .8rem; padding: .25rem 1rem; flex-shrink: 0; }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <input id="url" type="text" placeholder="输入网址或搜索关键词" autofocus />
      <button class="go" id="goBtn">访问</button>
      <button class="logout" onclick="location.href='/logout'">退出</button>
    </div>
    <div class="landing" id="landing">
      <h1>Web 代理</h1>
      <p>通过本服务器出口访问目标网站</p>
    </div>
    <iframe id="frame" allow="camera;microphone;geolocation" referrerpolicy="no-referrer"></iframe>
    <div id="status"></div>

    <script src="/baremux/index.js"></script>
    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>
    <script>
      const status = document.getElementById("status");
      const frame = document.getElementById("frame");
      const landing = document.getElementById("landing");
      const urlInput = document.getElementById("url");
      const connection = new BareMux.BareMuxConnection("/baremux/worker.js");
      let swReady = false;

      function waitActivated(reg) {
        const sw = reg.installing || reg.waiting || reg.active;
        if (sw && sw.state === "activated") return Promise.resolve();
        return new Promise((resolve) => {
          const target = reg.installing || reg.waiting || reg.active;
          if (!target) return resolve();
          target.addEventListener("statechange", () => {
            if (target.state === "activated") resolve();
          });
        });
      }

      async function registerSW() {
        if (!("serviceWorker" in navigator)) {
          throw new Error("当前浏览器不支持 Service Worker");
        }
        const reg = await navigator.serviceWorker.register("/sw.js", {
          scope: __uv$config.prefix,
        });
        await waitActivated(reg);
        const tokenRes = await fetch("/proxy-token");
        if (!tokenRes.ok) throw new Error("未授权");
        const { token } = await tokenRes.json();
        const bareUrl = location.origin + "/wp/" + token + "/bare/";
        await connection.setTransport("/transport/index.mjs", [bareUrl]);
        swReady = true;
      }

      registerSW().catch((err) => {
        status.textContent = "初始化失败：" + err.message;
      });

      function normalize(value) {
        const v = value.trim();
        if (!v) return null;
        if (/^https?:\/\//i.test(v)) return v;
        if (/^[^\s.]+\.[^\s]+/.test(v) && !v.includes(" ")) return "https://" + v;
        return "https://duckduckgo.com/?q=" + encodeURIComponent(v);
      }

      function navigate(target) {
        const encoded = __uv$config.encodeUrl(target);
        frame.src = __uv$config.prefix + encoded;
        frame.style.display = "";
        landing.style.display = "none";
        urlInput.value = target;
        status.textContent = "";
      }

      frame.addEventListener("load", () => {
        try {
          const src = frame.contentWindow?.location?.href || "";
          if (src.startsWith(location.origin + __uv$config.prefix)) {
            const encoded = src.slice(
              (location.origin + __uv$config.prefix).length
            );
            urlInput.value = __uv$config.decodeUrl(encoded);
          }
        } catch {
          /* cross-origin frame, can't read */
        }
      });

      document.getElementById("goBtn").addEventListener("click", async () => {
        const target = normalize(urlInput.value);
        if (!target) return;
        if (!swReady) {
          status.textContent = "代理引擎初始化中，请稍候…";
          try {
            await registerSW();
          } catch (err) {
            status.textContent = "初始化失败：" + err.message;
            return;
          }
        }
        navigate(target);
      });

      urlInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") document.getElementById("goBtn").click();
      });
    </script>
  </body>
</html>
